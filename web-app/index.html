<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- Apply saved language before React mounts to avoid an RTL→LTR flash (FOUC) -->
    <script>
      (function () {
        try {
          var lang = localStorage.getItem("lang") || "ar";
          var el = document.documentElement;
          el.lang = lang;
          el.dir = lang === "ar" ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/react.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>كورس رياكت 19</title>
    <!-- Cairo font is self-hosted in /public/fonts/ — no external request -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
